# Use in-memory H2 for tests to avoid file locking issues
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT Configuration
jwt.secret=dGhpcyBpcyBhIHNlY3VyZSBiYXNlNjQgZW5jb2RlZCAyNTYgYml0IHNlY3JldCBrZXkh
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=604800000

# Google OAuth
google.client-id=mock-client-id

# OTP Configuration
otp.expiry-minutes=5
otp.length=6

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Razorpay
razorpay.key-id=rzp_test_xxxxxxxxxxxx
razorpay.key-secret=your_razorpay_key_secret

# Firebase Storage (test placeholders — real credentials not needed for mocked tests)
firebase.enabled=false
firebase.credentials.path=firebase-service-account.json
firebase.storage.bucket=test-bucket.firebasestorage.app

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
