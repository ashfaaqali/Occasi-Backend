spring.application.name=Occasi

# File-based H2 database for persistence across restarts
spring.datasource.url=jdbc:h2:file:./data/occasi-db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Configuration
jwt.secret=dGhpcyBpcyBhIHNlY3VyZSBiYXNlNjQgZW5jb2RlZCAyNTYgYml0IHNlY3JldCBrZXkh
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://10.0.2.2:8080

# Google OAuth
google.client-id=your-google-client-id.apps.googleusercontent.com

# OTP Configuration
otp.expiry-minutes=5
otp.length=6
