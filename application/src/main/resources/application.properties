spring.application.name=Occasi

# File-based H2 database for persistence across restarts
spring.datasource.url=jdbc:h2:file:./data/occasi-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Configuration
jwt.secret=dGhpcyBpcyBhIHNlY3VyZSBiYXNlNjQgZW5jb2RlZCAyNTYgYml0IHNlY3JldCBrZXkh
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://10.0.2.2:8080

# Google OAuth
google.client-id=your-google-client-id.apps.googleusercontent.com

# OTP Configuration
otp.expiry-minutes=5
otp.length=6

# Razorpay
razorpay.key-id=rzp_test_xxxxxxxxxxxx
razorpay.key-secret=your_razorpay_key_secret

# Firebase Storage
firebase.credentials.path=firebase-service-account.json
firebase.storage.bucket=occasi-app.firebasestorage.app

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
