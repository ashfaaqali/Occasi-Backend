spring.application.name=Occasi

# JWT durations (secrets are in profile files)
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=604800000

# OTP
otp.expiry-minutes=5
otp.length=6

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Request logging
logging.http.enabled=true
logging.http.include-headers=false

# Admin API Key
admin.api.key=${ADMIN_API_KEY:default_development_admin_key_123}

