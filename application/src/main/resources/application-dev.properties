# H2 database
spring.datasource.url=jdbc:h2:file:./data/occasi-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Flyway off in dev (Hibernate manages schema)
spring.flyway.enabled=false

# JWT
jwt.secret=dGhpcyBpcyBhIHNlY3VyZSBiYXNlNjQgZW5jb2RlZCAyNTYgYml0IHNlY3JldCBrZXkh

# CORS
cors.allowed-origins=http://localhost:3000,http://10.0.2.2:8080

# Google OAuth
google.client-id=your-google-client-id.apps.googleusercontent.com

# Razorpay
razorpay.key-id=rzp_test_xxxxxxxxxxxx
razorpay.key-secret=your_razorpay_key_secret

# AWS S3
aws.s3.enabled=false
aws.s3.bucket=occasi-images
aws.s3.region=ap-south-1
aws.s3.access-key=your-access-key
aws.s3.secret-key=your-secret-key
