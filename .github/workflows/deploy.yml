name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Run tests
        run: ./gradlew test
        working-directory: application

      - name: Build JAR
        run: ./gradlew bootJar
        working-directory: application

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "application/build/libs/*.jar"
          target: "/home/ec2-user/"
          strip_components: 3

      - name: Restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mv /home/ec2-user/*.jar /home/ec2-user/occasi.jar
            sudo systemctl restart occasi
